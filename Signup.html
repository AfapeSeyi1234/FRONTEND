<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Food Management - Admin Sign Up</title>
    <link rel="stylesheet" href="css/Signup.css">
    <style>
        .signup-container {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden;
            background:
                linear-gradient(135deg,
                    rgba(30, 58, 138, 0.75) 0%,
                    rgba(30, 58, 138, 0.55) 50%,
                    rgba(245, 158, 11, 0.65) 100%),
                url("images/cafe.jpg") center/cover no-repeat fixed;
        }
    </style>
</head>

<body>
    <div class="signup-container">
        <div class="signup-content">
            <!-- Logo Header -->
            <div class="signup-header">
                <div class="logo-circle">
                    <img src="images/babcock-university-logo.jpg" alt="Babcock University" class="logo-img" />
                </div>
                <h1 class="signup-title">AI Food Management</h1>
                <p class="signup-subtitle">Create Admin Account</p>
            </div>

            <!-- Signup Card -->
            <div class="signup-card">
                <div class="card-header">
                    <h2 class="card-title">Admin Registration</h2>
                </div>

                <form id="signupForm" class="signup-form">
                    <div id="errorMessage" class="error-message hidden"></div>
                    <div id="successMessage" class="success-message hidden"></div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" placeholder="John" required />
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" placeholder="Doe" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="admin@babcock.edu.ng" required />
                    </div>

                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" required>
                            <option value="">Select Department</option>
                            <option value="food-management">Food Management</option>
                            <option value="administration">Administration</option>
                            <option value="nutrition">Nutrition & Health</option>
                            <option value="catering">Catering Services</option>
                            <option value="inventory">Inventory Management</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-input">
                            <input type="password" id="password" placeholder="Create a strong password" required />
                            <button type="button" id="togglePassword" class="password-toggle">
                                👁
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-input">
                            <input type="password" id="confirmPassword" placeholder="Confirm your password" required />
                            <button type="button" id="toggleConfirmPassword" class="password-toggle">
                                👁
                            </button>
                        </div>
                    </div>

                    <div class="terms">
                        <input type="checkbox" id="agreeTerms" required style="margin-right: 0.5rem" />
                        <label for="agreeTerms">I agree to the <a href="#">Terms & Conditions</a></label>
                    </div>

                    <button type="submit" id="signupBtn" class="signup-btn">
                        <span class="btn-text">Create Account</span>
                        <div class="btn-loading hidden">
                            <div class="spinner"></div>
                            Creating Account...
                        </div>
                    </button>
                </form>

                <div class="login-link">
                    Already have an account? <a href="Login.html">Sign In</a>
                </div>
            </div>

            <!-- Footer -->
            <div class="signup-footer">
                <p>© 2026 Babcock University. All rights reserved.</p>
            </div>
        </div>
    </div>


    <script src="js/config.js"></script>
    <script src="js/Signup.js"></script>
</body>

</html>
