<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Food Management - Admin Login</title>
    <link rel="stylesheet" href="css/Login.css">
    <style>
        .login-container {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background:
                linear-gradient(135deg,
                    rgba(30, 58, 138, 0.75) 0%,
                    rgba(30, 58, 138, 0.55) 50%,
                    rgba(245, 158, 11, 0.65) 100%),
                url("images/cafe.jpg") center/cover no-repeat fixed;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <!-- Cafe Background -->
        <div class="login-background">
            <div class="login-overlay"></div>
        </div>

        <!-- Login Content -->
        <div class="login-content">
            <!-- Logo Header -->
            <div class="login-header">
                <div class="logo-circle">
                    <img src="images/babcock-university-logo.jpg" alt="Babcock University" class="logo-img" />
                </div>
                <h1 class="login-title">AI Food Management</h1>
                <p class="login-subtitle">Babcock University Admin Portal</p>
            </div>

            <!-- Login Card -->
            <div class="login-card">
                <div class="card-header">
                    <h2 class="card-title">Admin Login</h2>
                </div>

                <form id="loginForm" class="login-form">
                    <div id="errorMessage" class="error-message hidden">
                        Invalid credentials. Please use admin@babcock.edu.ng / admin123
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="admin@babcock.edu.ng" required />
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-input">
                            <input type="password" id="password" placeholder="Enter your password" required />
                            <button type="button" id="togglePassword" class="password-toggle">
                                👁
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="loginBtn" class="login-btn">
                        <span class="btn-text">Sign In to Dashboard</span>
                        <div class="btn-loading hidden">
                            <div class="spinner"></div>
                            Signing In...
                        </div>
                    </button>

                    <!-- Sign Up and Forgot Password Buttons -->
                    <div class="button-group">
                        <button type="button" id="signupBtn" class="signup-btn">
                            Sign Up
                        </button>
                        <button type="button" id="forgotPasswordBtn" class="forgot-password-btn">
                            Forgot Password
                        </button>
                    </div>
                </form>

                <!-- Footer -->
                <div class="login-footer">
                    <p>© 2026 Babcock University. All rights reserved.</p>
                </div>
            </div>
        </div>

        <script src="js/config.js"></script>
        <script src="js/Login.js"></script>
</body>

</html>
