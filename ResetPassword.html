<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Food Management - Reset Password</title>
    <link rel="stylesheet" href="css/Login.css">
    <style>
        .login-container {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background:
                linear-gradient(135deg,
                    rgba(30, 58, 138, 0.75) 0%,
                    rgba(30, 58, 138, 0.55) 50%,
                    rgba(245, 158, 11, 0.65) 100%),
                url("images/cafe.jpg") center/cover no-repeat fixed;
        }

        .success-message {
            background: rgba(22, 163, 74, 0.1);
            border: 1px solid rgba(22, 163, 74, 0.2);
            color: #4ade80;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <!-- Login Content -->
        <div class="login-content">
            <!-- Logo Header -->
            <div class="login-header">
                <div class="logo-circle">
                    <img src="images/babcock-university-logo.jpg" alt="Babcock University" class="logo-img" />
                </div>
                <h1 class="login-title">AI Food Management</h1>
                <p class="login-subtitle">Babcock University Admin Portal</p>
            </div>

            <!-- Forgot Password Card -->
            <div class="login-card">
                <div class="card-header">
                    <h2 class="card-title">Reset Password</h2>
                    <p style="color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 8px;">
                        Enter your email to receive a password reset OTP.
                    </p>
                </div>

                <form id="resetPasswordForm" class="login-form">
                    <div id="statusMessage" class="hidden"></div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your registered email" required />
                    </div>

                    <button type="submit" id="sendOtpBtn" class="login-btn">
                        <span class="btn-text">Send Reset OTP</span>
                        <div class="btn-loading hidden">
                            <div class="spinner"></div>
                            Sending...
                        </div>
                    </button>

                    <div style="text-align: center; margin-top: 1rem;">
                        <a href="Login.html"
                            style="color: var(--accent); text-decoration: none; font-size: 14px; font-weight: 600;">
                            Back to Login
                        </a>
                    </div>
                </form>

                <!-- Footer -->
                <div class="login-footer">
                    <p>© 2026 Babcock University. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/ResetPassword.js"></script>
</body>

</html>
